name: tests

on:
  push:
    branches:
      - master
    tags-ignore:
      - "**" # Exclude tag pushes
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"] # Define Python versions as strings
        pandas-version: ["2", "3"]
        numba-enabled: ["false", "true"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install the project
        run: uv sync --locked --dev

      - name: Install optional numba
        if: matrix.numba-enabled == 'true'
        run: uv pip install "numba>=0.65.1,<1.0.0"

      - name: Install pandas ${{ matrix.pandas-version }}
        run: |
          if [ "${{ matrix.pandas-version }}" = "2" ]; then
            uv pip install "pandas>=2,<3"
          else
            uv pip install "pandas>=3,<4"
          fi

      - name: Run tests
        run: uv run just test-core
