name: Docker

on:
  pull_request:
    branches:
      - "master"
  push:
    branches:
      - "master"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      tag:
        description: "docker tag"
        required: true
        default: "test"

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Set image tag
        if: github.event_name == 'workflow_dispatch'
        run: echo "TAG=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
      - name: Set image tag from commit
        if: github.event_name != 'workflow_dispatch'
        run: echo "TAG=sha-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@v1
        with:
          image: tonistiigi/binfmt:latest
          platforms: all

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v1

      - name: Login to DockerHub
        if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push the release image
        uses: docker/build-push-action@v2
        with:
          context: .
          file: docker/release.Dockerfile
          push: ${{ github.ref == 'refs/heads/master' && github.event_name !=
            'pull_request' }}
          platforms: linux/arm64,linux/amd64
          tags: |
            tgoelles/pointcloudset:latest
            tgoelles/pointcloudset:${{ env.TAG }}
